        <script type="module">
            import init, { page_load, chart_js, user_run_sql, get_predefined_query } from "./pkg/bewegung.js";
            await init();
            
            document.addEventListener("click", e => {
              const a = e.target.closest("a");
              if (!a) return;
            
              if (a.classList.contains("to-image-viewer")) {
                e.preventDefault();
                iframe.src = a.href;
                dialog.showModal();
                return;
              }
            
              const href = a.getAttribute("href");
              if (!href || !href.startsWith("?")) return;
            
              e.preventDefault();
              history.pushState({}, "", href);
              page_load();
            });
            
            window.addEventListener("popstate", page_load);
            
            window.page_load = page_load;
            window.user_run_sql =  user_run_sql;
            window.load_code_editor = load_code_editor;
            window.get_code_editor = get_code_editor;
            window.initiate_spreadsheet = initiate_spreadsheet;
            window.get_predefined_query = get_predefined_query;
            
            // Image viewer
            const links = document.querySelectorAll('.to-image-viewer');
            const dialog = document.getElementById('image-viewer-dialog');
            const iframe = document.getElementById('image-viewer-content');
            const closeBtn = document.getElementById('close-dialog');
            links.forEach(link => {
              link.addEventListener('click', (e) => {
                e.preventDefault(); // prevent navigation
                iframe.src = link.href; // set iframe src to the link href
                dialog.showModal(); // show dialog
              });
            });
            closeBtn.addEventListener('click', () => {
              dialog.close();
              iframe.src = '';
            });
            
            // Import javascript
            const jsCode_chartjs = chart_js();
            const blob_chartjs = new Blob([jsCode_chartjs], { type: "text/javascript" });
            const url_chartjs = URL.createObjectURL(blob_chartjs);
            await import(url_chartjs);
            URL.revokeObjectURL(url_chartjs);

            // CODE EDITOR  -----------------------------------------------------------------------

            let cmView;

            function load_code_editor(newCode = null) {
                const container = document.getElementById("code_editor");
                if (!container) return;

                // Destroy old editor if DOM was replaced
                if (cmView && cmView.dom.parentNode !== container) {
                    cmView.destroy();
                    cmView = null;
                }

                // Create editor if it doesn't exist
                if (!cmView) {
                    cmView = cm6.load().textarea(container, {
                        dark: false,
                        sql: { dialect: "sqlite" },
                        completion: true
                    });
                    console.log("Editor created");
                }

                // Apply new code if provided
                if (typeof newCode === "string") {
                    cmView.dispatch({
                        changes: { from: 0, to: cmView.state.doc.length, insert: newCode }
                    });
                    console.log("Content updated");
                }
                console.log(cmView);
            }

            function get_code_editor() {
                if (!cmView) return ""; // editor not initialized yet
                return cmView.state.doc.toString();
            }

        </script>


        <script>

        // CUSTOM QUERIES  -----------------------------------------------------------------------

            async function load_query_from_file(path) {
                const res = await fetch(path);
                const text = await res.text();
                load_code_editor(text);
            }

            async function custom_queries(rowid) {

                const sql_req  = await user_run_sql('SELECT * FROM com_CodeCollection WHERE ROWID = "' + rowid + '";');
                const custom_reponse = JSON.parse(document.getElementById("sql_output_data").textContent);
                load_code_editor(custom_reponse.rows[0][2]);

            }

        // THEME  -----------------------------------------------------------------------

        function initialize_theme_color() {
            const button = document.getElementById('themeToggle');

            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark');
            }

            button.addEventListener('click', () => {
                document.body.classList.toggle('dark');

                // Save current theme to localStorage
                if (document.body.classList.contains('dark')) {
                    localStorage.setItem('theme', 'dark');
                } else {
                    localStorage.setItem('theme', 'light');
                }

            });
        }
